name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout leaderboard repo
        uses: actions/checkout@v4

      - name: Checkout benchmark repo at the snapshot's pinned commit
        # site-data/leaderboard.json is regenerated each deploy from results/.
        # The generator needs the benchmark repo for problem metadata. We pin
        # to the same commit benchmark-snapshot/ was built from so the
        # snapshot's catalog and the regenerated site-data stay in lockstep.
        uses: actions/checkout@v4
        with:
          repository: leanprover/lean-eval
          path: lean-eval-benchmark
          fetch-depth: 0

      - name: Pin benchmark checkout to snapshot commit
        run: |
          pin=$(cat benchmark-snapshot/.benchmark-commit)
          echo "Pinning benchmark to $pin"
          git -C lean-eval-benchmark checkout "$pin"

      - name: Set up elan
        shell: bash
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Cache site Lake workspace
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: ${{ runner.os }}-site-lake-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lakefile.toml', 'lake-manifest.json') }}

      - name: Cache benchmark snapshot Lake workspace
        uses: actions/cache@v4
        with:
          path: |
            benchmark-snapshot/.lake/packages
            benchmark-snapshot/.lake/build
          key: ${{ runner.os }}-snapshot-lake-${{ hashFiles('benchmark-snapshot/lean-toolchain', 'benchmark-snapshot/lakefile.toml', 'benchmark-snapshot/BenchmarkProblems.lean', 'benchmark-snapshot/BenchmarkProblems/**/*.lean') }}

      - name: Fetch Lake dependencies
        run: lake update

      - name: Prebuild benchmark snapshot
        shell: bash
        run: |
          cd benchmark-snapshot
          lake update
          lake build BenchmarkProblems BenchmarkProblems.Catalog subverso-extract-mod +BenchmarkProblems.Catalog:highlighted

      - name: Regenerate site-data from results/ and the pinned benchmark
        # site-data/ is .gitignored — regenerated here so every record: push
        # to results/ shows up on the next deploy. --no-write-snapshot keeps
        # benchmark-snapshot/ untouched so its Lake cache stays warm.
        run: |
          python3 scripts/generate_site_data.py \
            --no-write-snapshot \
            --benchmark-repo lean-eval-benchmark

      - name: Build site
        run: lake exe lean-eval-leaderboard --output _site

      - name: Check internal links resolve under the GitHub Pages base path
        # GitHub Pages serves this site under `/lean-eval-leaderboard/`, so a
        # link like `/foo` (root-absolute) or `../foo` (popping past the base
        # path) 404s in production even though it might resolve fine against a
        # flat `_site/` mount. `scripts/check_links.py` emulates the deployed
        # URL shape and fails on any href/src that escapes the base path or
        # points at a file that doesn't exist under `_site/`.
        run: |
          python3 scripts/check_links.py --site-dir _site --prefix lean-eval-leaderboard

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
